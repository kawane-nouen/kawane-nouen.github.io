  function loadingProcess(){
    //サーバーからスプレッドシートのデータを取得する
    google.script.run.withSuccessHandler(dispSpreadsheet).GetSpreadsheet("タジマ",1);
  }
  window.addEventListener('load', loadingProcess);

  window.onload = function() {
    google.script.run.withSuccessHandler(createPulldown).getOptionsFromSheet("エリア");
    google.script.run.withSuccessHandler(createPulldownNumber).getOptionsFromSheet("タジマ");
  };

  function checkImageExists(url) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => resolve(true);  // 画像が存在する
      img.onerror = () => resolve(false); // 画像が存在しない、またはエラー
      img.src = url;
    });
  }

  //取得したデータを表示する

    document.getElementById("item_13").innerHTML = spreadsheet_data[0][8];
    document.getElementById("item_14").innerHTML = spreadsheet_data[0][9];
    document.getElementById("item_15").innerHTML = spreadsheet_data[0][10];
    document.getElementById("item_16").innerHTML = spreadsheet_data[0][11];
    document.getElementById("item_17").innerHTML = spreadsheet_data[0][12];

    htmlTable += spreadsheet_data[0][16];
    htmlTable += '" width=100% alt="">'
    document.getElementById("item_20").innerHTML = htmlTable;

    htmlTable = '<img src="';
    htmlTable += spreadsheet_data[0][17];
    htmlTable += '" width=100% alt="">'
    document.getElementById("item_21").innerHTML = htmlTable;
    checkImageExists(spreadsheet_data[0][19]).then(exists => {
      if (exists) {

        htmlTable = '<img src="';

      } else {

        console.log('画像が存在しません');
      }
    });

      if (exists) {
        document.getElementById("show2").style.display = "block";
        htmlTable = '<img src="';
        htmlTable += spreadsheet_data[0][20];
        htmlTable += '" width=100% alt="">'
        document.getElementById("item_32").innerHTML = htmlTable;
      } else {
        document.getElementById("show2").style.display = "none";
      }
    });

    checkImageExists(spreadsheet_data[0][21]).then(exists => {
      if (exists) {
        document.getElementById("show3").style.display = "block";
        htmlTable = '<img src="';
        htmlTable += spreadsheet_data[0][21];
        htmlTable += '" width=100% alt="">'
        document.getElementById("item_33").innerHTML = htmlTable;
      } else {
        document.getElementById("show3").style.display = "none";
      }
    });

    checkImageExists(spreadsheet_data[0][22]).then(exists => {
      if (exists) {
        document.getElementById("show4").style.display = "block";
        htmlTable = '<img src="';
        htmlTable += spreadsheet_data[0][22];
        htmlTable += '" width=100% alt="">'
        document.getElementById("item_34").innerHTML = htmlTable;
      } else {
        document.getElementById("show4").style.display = "none";
      }
    });
  }
  function createPulldown(options) {
    const select = document.getElementById('pulldown_area');
    options.forEach(function(item) {
      const option = document.createElement('option');
      option.value = item;
      option.textContent = item;
      select.appendChild(option);
    });
  }
  function createPulldownNumber(options) {
    const select = document.getElementById('pulldown_num');
    select.innerHTML = '';
    options.forEach(function(item) {
      const option = document.createElement('option');
      option.value = item;
      option.textContent = item;
      select.appendChild(option);
    });
  }
  function selectArea() {
    const area = document.getElementById('pulldown_area').value;
    var num = document.getElementById('pulldown_num').value;
    console.log("change area:"+area+"-"+num);
    google.script.run.withSuccessHandler(createPulldownNumber).getOptionsFromSheet(area);
    google.script.run.withSuccessHandler(dispSpreadsheet).GetSpreadsheet(area,Number(num));
  }
    function selectNumber() {
    const area = document.getElementById('pulldown_area').value;
    var num = document.getElementById('pulldown_num').value;
    console.log("change num:"+area+"-"+num);
    google.script.run.withSuccessHandler(dispSpreadsheet).GetSpreadsheet(area,Number(num));
  }
  </script>
