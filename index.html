<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <base target="_top">
    <style>
    * {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height:100vh;
    }
    iframe {
      border:none;
      width:100%;
      height:100%;
    }
    </style>
  </head>
  <script>
    window.onload = (e) => {
        const gasappurl = 'https://script.google.com/macros/s/AKfycbxplhZIiMKZI8_m2anN3EbzH2uXwwWp4Cq502MLp3xtcPprNc5gZeX8XxIjpqrh140P/exec'
        let ifm = document.getElementById('gasiframe')
        ifm.src = gasappurl + window.location.search
    }
  </script>
  <body>
  <div class="container">
    <iframe id="gasiframe" src="about:blank"></iframe>
  </div>
  </body>
</html>
